[build-system]
requires      = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

# Verbatim source baseline: hubzero-trac-mysqlauthz-2.2.5-1.el8 (Py2 only).
# Subsequent commits port it to a dual-target Py2.7 + Py3.11 wheel and fix the
# bugs surfaced in the audit (SQL injection, class-level connection state,
# `<>` operator, `import ConfigParser`, `import MySQLdb`).  The first port
# commit will widen `dependencies` to PyMySQL (env-marked) + `configparser`
# backport on Py2.
[project]
name            = "hubzero-trac-mysqlauthz"
version         = "2.2.5+hzforge.0"
description     = "HUBzero IPermissionStore / IPermissionGroupProvider for Trac (MySQL CMS backend)"
readme          = "README.md"
license         = { text = "MIT" }
authors         = [{ name = "The Regents of the University of California" }]
maintainers     = [{ name = "HUBzero" }]
requires-python = ">=2.7, !=3.0.*, !=3.1.*, !=3.2.*, !=3.3.*, !=3.4.*, <4"
classifiers     = [
    "Development Status :: 4 - Beta",
    "Environment :: Plugins",
    "Framework :: Trac",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 2",
    "Programming Language :: Python :: 2.7",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies    = [
    # Trac itself spans the range we target: 1.0.x on Py2 hubs through 1.6+ on Py3 hubs.
    "Trac>=1.0",
    # MySQLdb (`mysql-python` / `mysqlclient`) is currently required at runtime by
    # the verbatim source; it's deliberately NOT listed here because the port
    # commit replaces `import MySQLdb` with `import pymysql` and adds PyMySQL +
    # configparser (Py2 backport) as the declared deps.  Until then, install via
    # the OS package (`python2-mysql`) on Py2 hosts.
]

[project.entry-points."trac.plugins"]
# Preserved exactly from hubzero-trac-mysqlauthz 2.x so the Py3 wheel drops in
# over the existing RPM without any trac.ini change.
"hubzeroplugin.api" = "hubzeroplugin.api"

[project.urls]
Source   = "https://github.com/hubzero/hzforge/tree/main/plugins/mysqlauthz"
Upstream = "https://gitlab.hubzero.org/hubzero-packaging-repositories/hubzero-trac-mysqlauthz"

[tool.setuptools.packages.find]
where = ["src"]
